services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      - APP_ENV=development
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=excel_importer_db
      - DB_USERNAME=sail
      - DB_PASSWORD=${MYSQL_PASSWORD:-password}
      # Remote MSSQL configuration (user can override in UI)
      - MSSQL_SERVER=${MSSQL_SERVER:-localhost}
      - MSSQL_DATABASE=${MSSQL_DATABASE:-tempdb}
      - MSSQL_TRUSTED_CONNECTION=yes
    volumes:
      - ./backend/storage/app/uploads:/var/www/html/storage/app/uploads
      - ./backend/storage/logs:/var/www/html/storage/logs
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    # Expose MySQL on LAN for testing (uncomment in production)
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: excel_importer_db
      MYSQL_USER: sail
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
